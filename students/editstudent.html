<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Edit Student</title>

  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">
  <h2>Edit Student</h2>

  <form id="editForm">

    <div class="form-row">
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" id="name" placeholder="Enter full name" required>
      </div>

      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" placeholder="Enter email" required>
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>Class</label>
        <input type="text" id="studentClass" placeholder="Enter class" required>
      </div>

      <div class="form-group">
        <label>Roll Number</label>
        <input type="text" id="roll" placeholder="Enter roll number">
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>Phone</label>
        <input type="text" id="phone" placeholder="Enter phone number">
      </div>

      <div class="form-group">
        <label>Address</label>
        <input type="text" id="address" placeholder="Enter address">
      </div>
    </div>

    <button type="submit" class="btn">Update Student</button>

  </form>

  <a href="../dashboard/dashboard.html">Back</a>
</div>

<!-- Firebase CDN -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>

<!-- ✅ ADD THIS -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script src="../js/firebase.js"></script>

<script>
const urlParams = new URLSearchParams(window.location.search);
const id = urlParams.get("id");

// Load existing data
db.collection("students").doc(id).get()
  .then((doc) => {
    const data = doc.data();

    document.getElementById("name").value = data.name;
    document.getElementById("email").value = data.email;
    document.getElementById("studentClass").value = data.class;
    document.getElementById("roll").value = data.roll;
    document.getElementById("phone").value = data.phone;
    document.getElementById("address").value = data.address;
  });

// Update student
document.getElementById("editForm").addEventListener("submit", function(e){
  e.preventDefault();

  db.collection("students").doc(id).update({
    name: document.getElementById("name").value,
    email: document.getElementById("email").value,
    class: document.getElementById("studentClass").value,
    roll: document.getElementById("roll").value,
    phone: document.getElementById("phone").value,
    address: document.getElementById("address").value
  })
  .then(() => {
    alert("Student updated!");
    window.location.href = "../dashboard/dashboard.html";
  });
});
</script>

</body>
</html>
