<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Add Student</title>

 <link rel="stylesheet" href="style.css">
</head>

<body>

  

  <!-- FORM -->
  <section class="student-form">
    <div class="container">

      <h2>Add Student</h2>

      <form id="studentForm">

        <div class="row">
          <input type="text" id="name" placeholder="Full Name" required>
          <input type="email" id="email" placeholder="Email" required>
        </div>

        <div class="row">
          <input type="text" id="studentClass" placeholder="Class" required>
          <input type="text" id="roll" placeholder="Roll Number">
        </div>

        <div class="row">
          <input type="text" id="phone" placeholder="Phone Number">
          <input type="text" id="address" placeholder="Address">
        </div>

        <button type="submit">Add Student</button>
      </form>

      <a href="../dashboard/dashboard.html" class="back-btn">Go Back</a>

    </div>
  </section>

  <!-- Navbar Loader -->
  <script src="../js/navbar-loader.js"></script>

  <!-- Firebase CDN -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>

<!-- ✅ ADD THIS -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>



  <!-- Firebase Config -->
  <script src="../js/firebase.js"></script>

  <!-- SCRIPT -->
  <script>
    const form = document.getElementById("studentForm");

    form.addEventListener("submit", function(e) {
      e.preventDefault();

      if (typeof db === "undefined") {
        alert("Firebase not connected!");
        return;
      }

      const name = document.getElementById("name").value;
      const email = document.getElementById("email").value;
      const studentClass = document.getElementById("studentClass").value;
      const roll = document.getElementById("roll").value;
      const phone = document.getElementById("phone").value;
      const address = document.getElementById("address").value;

      db.collection("students").add({
        name: name,
        email: email,
        class: studentClass,
        roll: roll,
        phone: phone,
        address: address,
        createdAt: new Date()
      })
      .then(() => {
        alert("✅ Student added successfully!");
        window.location.href = "../dashboard/dashboard.html";
      })
      .catch((error) => {
        console.error(error);
        alert("❌ Error: " + error.message);
      });
    });
  </script>

</body>
</html>
