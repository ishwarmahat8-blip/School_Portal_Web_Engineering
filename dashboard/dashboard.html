<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dashboard</title>

  
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- Navbar -->
  

  <div class="dashboard">

    <!-- SIDEBAR -->
    <aside class="sidebar">
      <h2>Admin</h2>

      <ul>
        <li>Dashboard</li>
        <li><a href="../students/addstudent.html">Add Students</a></li>
        
        <li onclick="logout()">Sign Out</li>
      </ul>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="main-content">

      <!-- CARDS -->
      <div class="cards">

        <div class="card">
          <h3>Total Students</h3>
          <p>120</p>
        </div>

        <div class="card">
          <h3>Total Courses</h3>
          <p>8</p>
        </div>

        <div class="card">
          <h3>Active Users</h3>
          <p>45</p>
        </div>

      </div>

      <!-- STUDENT TABLE -->
      <div class="table-section">
        <h2>Students</h2>

        <table>
  <thead>
    <tr>
      <th>Name</th>
      <th>Class</th>
      <th>Email</th>
      <th>Action</th>
    </tr>
  </thead>

  <tbody id="studentTableBody">
    <!-- Firebase data will load here -->
  </tbody>
</table>

      </div>

    </main>

  </div>
  <h2>Student Applications</h2>

<table>
  <thead>
    <tr>
      <th>Name</th>
      <th>Email</th>
      <th>Course</th>
      <th>Status</th>
      <th>Action</th>
    </tr>
  </thead>

  <tbody id="applicationTableBody"></tbody>
</table>


</body>
</html>
<!-- Firebase CDN -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<!-- Firebase Config -->
<script src="../js/firebase.js"></script>

<script>
const ADMIN_EMAIL = "admin@school.com";

firebase.auth().onAuthStateChanged(user => {
  if (user && user.email === ADMIN_EMAIL) {
    loadStudents();
    loadApplications(); // ✅ ADD THIS LINE
  } else {
    window.location.href = "../auth/login.html";
  }
});

// ================= STUDENTS =================

function loadStudents() {
  const table = document.getElementById("studentTableBody");
  table.innerHTML = "";

  db.collection("students").get()
    .then(snapshot => {
      snapshot.forEach(doc => {
        const data = doc.data();

        table.innerHTML += `
          <tr>
            <td>${data.name}</td>
            <td>${data.class}</td>
            <td>${data.email}</td>
            <td>
              <button onclick="editStudent('${doc.id}')">Edit</button>
              <button onclick="deleteStudent('${doc.id}')">Delete</button>
            </td>
          </tr>
        `;
      });
    })
    .catch(error => console.error("Student Error:", error));
}

function deleteStudent(id) {
  if (confirm("Delete this student?")) {
    db.collection("students").doc(id).delete()
      .then(() => {
        alert("Deleted!");
        loadStudents();
      });
  }
}

function editStudent(id) {
  window.location.href = "../students/editstudent.html?id=" + id;
}


// ================= APPLICATIONS =================

function loadApplications() {
  const table = document.getElementById("applicationTableBody");
  table.innerHTML = "";

  db.collection("applications").get()
    .then(snapshot => {
      snapshot.forEach(doc => {
        const data = doc.data();

        table.innerHTML += `
          <tr>
            <td>${data.name}</td>
            <td>${data.email}</td>
            <td>${data.course}</td>
            <td>${data.status}</td>
            <td>
              <button onclick="approve('${doc.id}')">Approve</button>
              <button onclick="reject('${doc.id}')">Reject</button>
            </td>
          </tr>
        `;
      });
    })
    .catch(error => console.error("Application Error:", error));
}


// ✅ APPROVE (move to students)
function approve(id) {
  db.collection("applications").doc(id).get().then(doc => {
    const data = doc.data();

    // move to students
    db.collection("students").add({
      name: data.name,
      email: data.email,
      class: data.course // map course → class
    }).then(() => {

      // delete from applications
      db.collection("applications").doc(id).delete();

      alert("Approved & moved to students!");

      loadApplications();
      loadStudents();
    });
  });
}


// ❌ REJECT
function reject(id) {
  db.collection("applications").doc(id).update({
    status: "rejected"
  }).then(() => {
    alert("Rejected!");
    loadApplications();
  });
}


// 🚪 LOGOUT
function logout() {
  firebase.auth().signOut().then(() => {
    window.location.href = "../auth/login.html";
  });
}
</script>
